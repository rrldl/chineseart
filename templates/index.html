<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵灵境 | 艺术探索助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@400;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="bg-layer active" id="bg-current"></div>
<div class="bg-layer" id="bg-next"></div>
<div class="main-container glass-card">
    <header class="app-header">
        <div class="logo-title">
            <h1>墨韵灵境</h1>
        </div>
        <!-- 功能模式切换 -->
        <div class="mode-tabs">
            <button id="tab-qa" class="tab-btn active" data-tab="qa">
                <i class="fas fa-comment"></i> 艺术问答
            </button>
            <button id="tab-image-upload" class="tab-btn" data-tab="image-upload">
                <i class="fas fa-upload"></i> 图像分析
            </button>
            <button id="tab-image-search" class="tab-btn" data-tab="image-search">
                <i class="fas fa-search"></i> 以图搜图
            </button>
            <button id="tab-image-search" class="tab-btn" data-tab="text-search">
                <i class="fas fa-font"></i> 以文搜图
            </button>
        </div>
    </header>

    <!-- 内容区域 -->
    <div class="content-area">
        <!-- 左侧：聊天/结果显示 -->
        <div class="result-panel">
            <div id="chat-history" class="chat-history">
                <div class="welcome-message">
                    <h3>欢迎使用墨韵灵境！</h3>
                    <p>请选择上方的功能模式开始探索：</p>
                    <ul>
                        <li><strong>艺术问答</strong>：输入文字问题，获取艺术知识</li>
                        <li><strong>图像分析</strong>：上传图片，进行分割和描述</li>
                        <li><strong>以图搜图</strong>：上传图片，查找相似艺术作品</li>
                        <li><strong>以文搜图</strong>：输入文字描述，查找相关作品</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 右侧：控制面板 -->
        <div class="control-panel">
            <!-- 艺术问答面板 -->
            <div id="panel-qa" class="control-panel-content active">
                <h3><i class="fas fa-comment"></i> 艺术问答</h3>
                <div class="settings">
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="multi-hop" checked>
                            启用多跳查询
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>搜索深度：
                            <select id="search-depth">
                                <option value="Deeper">深度</option>
                                <option value="Deep">适中</option>
                            </select>
                        </label>
                    </div>
                </div>
                <textarea id="question-input" placeholder="请输入您的艺术问题，例如：『张大千的代表作有哪些？』" rows="6"></textarea>
                <button id="ask-btn" class="action-btn">
                    <i class="fas fa-paper-plane"></i> 发送问题
                </button>
            </div>

            <!-- 图像分析面板 -->
            <div id="panel-image-upload" class="control-panel-content">
                <h3><i class="fas fa-upload"></i> 图像分析</h3>
                <p class="hint">上传图片进行自动分割和描述分析</p>
                <div class="upload-area" id="upload-area-1">
                    <div class="upload-zone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>点击或拖拽图片到此处</p>
                        <input type="file" id="image-upload-1" accept="image/*" class="file-input">
                        <span class="file-info">支持PNG, JPG, JPEG, GIF, BMP, TIFF格式</span>
                    </div>
                </div>
                <div id="image-preview-1" class="image-preview hidden">
                    <img id="preview-img-1" src="" alt="预览图片">
                    <button class="remove-btn" data-id="1">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <button id="analyze-btn" class="action-btn" disabled>
                    <i class="fas fa-magic"></i> 开始分析
                </button>
            </div>

            <!-- 以图搜图面板 -->
            <div id="panel-image-search" class="control-panel-content">
                <h3><i class="fas fa-search"></i> 以图搜图</h3>
                <p class="hint">上传图片查找相似的艺术作品</p>
                <div class="upload-area" id="upload-area-2">
                    <div class="upload-zone">
                        <i class="fas fa-image"></i>
                        <p>点击或拖拽图片到此处</p>
                        <input type="file" id="image-upload-2" accept="image/*" class="file-input">
                        <span class="file-info">查找相似的艺术作品</span>
                    </div>
                </div>
                <div class="search-options">
                    <label>返回数量：
                        <select id="image-search-count">
                            <option value="1">1个结果</option>
                            <option value="2">2个结果</option>
                            <option value="3">3个结果</option>
                            <option value="5" selected>5个结果</option>
                        </select>
                    </label>
                </div>
                <div id="image-preview-2" class="image-preview hidden">
                    <img id="preview-img-2" src="" alt="预览图片">
                    <button class="remove-btn" data-id="2">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <button id="search-image-btn" class="action-btn" disabled>
                    <i class="fas fa-search"></i> 开始搜索
                </button>
            </div>

            <!-- 以文搜图面板 -->
            <div id="panel-text-search" class="control-panel-content">
                <h3><i class="fas fa-font"></i> 以文搜图</h3>
                <p class="hint">输入文字描述查找相关艺术作品</p>
                <textarea id="text-search-input" placeholder="请输入文字描述，例如：『山水画，宋代，写意』" rows="6"></textarea>
                <div class="search-options">
                    <label>返回数量：
                        <select id="search-count">
                            <option value="1">1个结果</option>
                            <option value="2">2个结果</option>
                            <option value="3">3个结果</option>
                            <option value="5" selected>5个结果</option>
                        </select>
                    </label>
                </div>
                <button id="search-text-btn" class="action-btn">
                    <i class="fas fa-search"></i> 开始搜索
                </button>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div class="status-info">
            <span class="status-dot active"></span>
            <span id="status-text">系统就绪</span>
        </div>
        <div class="processing-indicator hidden" id="processing-indicator">
            <div class="spinner"></div>
            <span id="processing-text">正在处理...</span>
        </div>
    </div>
</div>

<!-- 搜索结果模态框 -->
<div id="search-results-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">搜索结果</h3>
            <button class="close-modal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="search-results-body">
            <!-- 搜索结果动态加载 -->
        </div>
    </div>
</div>
<script>
  const bgImages = {{ bg_images | tojson }}.map(f => `/static/images/${f}`);
</script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
